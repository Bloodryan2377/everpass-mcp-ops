[build.services]

[[headers]]
for = "/index.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/*.html"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"

[[headers]]
for = "/*.js"

[headers.values]
Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/mobile/index.html"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/mobile/sw.js"

[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"
Service-Worker-Allowed = "/mobile/"

[[headers]]
for = "/mobile/manifest.webmanifest"

[headers.values]
Content-Type = "application/manifest+json; charset=utf-8"
Cache-Control = "public, max-age=300, must-revalidate"

[[headers]]
for = "/data/mobile/*.json"

[headers.values]
Cache-Control = "public, max-age=60, must-revalidate"
X-Content-Type-Options = "nosniff"

[[redirects]]
from = "https://everpass-dashboard.netlify.app/*"
to = "https://dashboard.everpasspipeline.com/:splat"
status = 301.0
force = true

